naftiko: 1.0.0-alpha2
info:
  label: Truework Beta API — Qualification Checks
  description: 'Truework Beta API — Qualification Checks. 3 operations covering qualification check creation, retrieval, and listing of qualification check sets. Beta surface; schema may evolve.'
  tags:
  - Truework
  - Qualifications
  - Beta
  - VOIE
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    TRUEWORK_API_KEY: TRUEWORK_API_KEY
capability:
  consumes:
  - type: http
    namespace: qualifications-checks
    baseUri: https://api.truework.com
    description: Truework Qualification Checks beta API. Self-contained, no shared references.
    resources:
    - name: qualification-checks
      path: /qualification-checks
      operations:
      - name: createqualificationcheck
        method: POST
        description: Create a qualification check request.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: qualification-check-by-id
      path: /qualification-checks/{qualification_check_result_id}
      operations:
      - name: getqualificationcheck
        method: GET
        description: Retrieve a qualification check result.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: qualification_check_result_id
          in: path
          type: string
          required: true
    - name: qualification-check-sets
      path: /qualification-check-sets
      operations:
      - name: listqualificationchecksets
        method: GET
        description: List qualification check sets defined for the tenant.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      key: Authorization
      value: 'Bearer {{env.TRUEWORK_API_KEY}}'
      placement: header
  exposes:
  - type: mcp
    namespace: qualifications-checks-mcp
    port: 9092
    transport: http
    description: MCP adapter for Truework Qualification Checks.
    tools:
    - name: truework-create-qualification-check
      description: Create a Truework qualification check.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qualifications-checks.createqualificationcheck
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: truework-get-qualification-check
      description: Retrieve a Truework qualification check result.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qualifications-checks.getqualificationcheck
      with:
        qualification_check_result_id: tools.qualification_check_result_id
      outputParameters:
      - type: object
        mapping: $.
    - name: truework-list-qualification-check-sets
      description: List qualification check sets defined for the tenant.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qualifications-checks.listqualificationchecksets
      outputParameters:
      - type: object
        mapping: $.

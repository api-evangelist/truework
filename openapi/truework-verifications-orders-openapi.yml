        application                                                                                      |

        | legitimate-reason-initiated        | Legitimate business need for the information in connection with a
        business transaction initiated by the target                                      |

        | legitimate-reason-review           | Legitimate business need to review the target's account to determine
        whether the employee continues to meet the terms of the account                |

        | risk-assessment                    | To assess the credit or prepayment risks associated with an existing

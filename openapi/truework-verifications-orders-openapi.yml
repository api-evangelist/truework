            Specify the content type and version that the API should use. It's recommended to include this to avoid
            breaking changes.
          required: false
          schema:
            $ref: '#/components/schemas/OrdersReverificationPostParametersAccept'
            default: application/json
        - name: Request-Sync
          in: header
          description: >-
            A header that defines if a request should be executed synchronously. Only Verifications that were initially
            executed synchronously may be reverified synchronously. `sync` can only return completed or canceled
            verification responses, not pending. `async` will return only pending.

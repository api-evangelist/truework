    ExternalStateOutputWrapperV20231030CanonicalValue:
      type: string
      enum:
        - pending-approval
        - action-required
        - invalid
        - processing
        - completed
        - canceled
        - other
      description: >-
        The state helps convey where the verification request is in the Truework process. It will be returned in the
        JSON objects returned from this endpoint.


        The initial state of all Schemas is pending-approval, and will switch to processing once Truework begins to
        process the request. However, it may switch back to pending-approval if it is pending approval by the target.


        The states completed, canceled, invalid are all terminal states of a Verification. A Report is only available
        when it is in the completed state. A Verification will enter the state canceled when either Truework or an API
        user cancels the request. The invalid state indicates that there are issues with the data e.g. we could not
        locate the employee at a given employer, or could not find the employer itself.



        | VALUE            |
        DESCRIPTION                                                                                             |

        | ---------------- |
        ------------------------------------------------------------------------------------------------------- |

        | pending-approval | The initial state after creation; the Truework team has not started working on this request
        yet         |

        | action-required  | A user action is required to continue processing this request; visit the dashboard for more
        information |

        | invalid          | Contains invalid information that prevents the verification request from being processed by
        Truework    |

        | processing       | The Truework team is currently working on the verification
        request                                      |

        | completed        | The verification request has been completed and a report can be found from the reports
        endpoint         |

        | canceled         | Truework denied processing of the request or the verifier no longer wants the request to be
        processed   |

        | other            | No other value fits the state of this verification request |
      title: ExternalStateOutputWrapperV20231030CanonicalValue
    ExternalStateOutputWrapperV20231030:
      type: object
      properties:
        canonical_value:
          $ref: '#/components/schemas/ExternalStateOutputWrapperV20231030CanonicalValue'
          description: >-
            The state helps convey where the verification request is in the Truework process. It will be returned in the
            JSON objects returned from this endpoint.


            The initial state of all Schemas is pending-approval, and will switch to processing once Truework begins to
            process the request. However, it may switch back to pending-approval if it is pending approval by the
            target.


            The states completed, canceled, invalid are all terminal states of a Verification. A Report is only
            available when it is in the completed state. A Verification will enter the state canceled when either
            Truework or an API user cancels the request. The invalid state indicates that there are issues with the data
            e.g. we could not locate the employee at a given employer, or could not find the employer itself.



            | VALUE            |
            DESCRIPTION                                                                                             |

            | ---------------- |
            ------------------------------------------------------------------------------------------------------- |

            | pending-approval | The initial state after creation; the Truework team has not started working on this
            request yet         |

            | action-required  | A user action is required to continue processing this request; visit the dashboard for
            more information |

            | invalid          | Contains invalid information that prevents the verification request from being
            processed by Truework    |

            | processing       | The Truework team is currently working on the verification
            request                                      |

            | completed        | The verification request has been completed and a report can be found from the reports
            endpoint         |

            | canceled         | Truework denied processing of the request or the verifier no longer wants the request
            to be processed   |

            | other            | No other value fits the state of this verification request |
        raw_value:
          type: string
          description: >-
            An unlimited string representation of the value, which may provide more detail when the canonical value is
            "other".
      required:
        - canonical_value
        - raw_value
      title: ExternalStateOutputWrapperV20231030
